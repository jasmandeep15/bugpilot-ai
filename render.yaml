services:
  - type: web
    name: bugpilot-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: BUGPILOT_AI_PROVIDER
        value: deterministic
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: bugpilot-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bugpilot-api.onrender.com
