spring.application.name=bugpilot-backend
spring.application.name=bugpilot-backend
server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
bugpilot.cors.allowed-origins=http://127.0.0.1:5173,http://localhost:5173,https://jasmandeep15.github.io,https://bugpilot-web.onrender.com
bugpilot.rate-limit.requests-per-minute=30
logging.pattern.level=%5p requestId=%X{requestId:-}
